plugins {
    id 'java'
    id 'application'
    id 'org.openjfx.javafxplugin' version '0.1.0'
}

group = 'edu.nust'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

application {
    def useTestLogger = project.hasProperty("testLogger")
    def disableLogs = project.hasProperty("noLogs")

    mainClass = useTestLogger
            ? 'edu.nust.tests.TestLogger'
            : 'edu.nust.Main'

    def logConfig = disableLogs
            ? "${projectDir}/src/main/resources/edu/nust/engine/logger/logback-off.xml"
            : "${projectDir}/src/main/resources/edu/nust/engine/logger/logback.xml"

    applicationDefaultJvmArgs = [
            '--enable-native-access=javafx.graphics',
            "-Dlogback.configurationFile=${logConfig}"
    ]
}

javafx {
    version = "23.0.2"
    modules = ['javafx.controls', 'javafx.fxml']
}

dependencies {
    compileOnly 'org.jetbrains:annotations:24.1.0'

    // LOGGER
    implementation 'org.slf4j:slf4j-api:2.0.17'
    implementation 'ch.qos.logback:logback-classic:1.5.32'

    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

test {
    useJUnitPlatform()
}